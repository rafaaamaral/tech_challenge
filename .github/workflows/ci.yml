name: Build and Deploy

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: 10.0.x
  EF_TOOLS_VERSION: 10.0.7
  SOLUTION_FILE: tech_challenge_fase_1.slnx
  API_PROJECT: src/tech_challenge.API/tech_challenge.API.csproj
  INFRA_PROJECT: src/tech_challenge.Infrastructure/tech_challenge.Infrastructure.csproj
  TEST_RESULTS_DIR: artifacts/test-results
  COVERAGE_REPORT_DIR: artifacts/coverage-report
  PUBLISH_DIR: artifacts/publish/api
  MIGRATION_DIR: artifacts/database
  CONFIGURATION: Release

jobs:
  quality-gate:
    name: 1. Restore, build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_FILE }} --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Run automated tests with coverage
        run: >
          dotnet test ${{ env.SOLUTION_FILE }}
          --configuration ${{ env.CONFIGURATION }}
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ${{ env.TEST_RESULTS_DIR }}
          --collect:"XPlat Code Coverage"

      - name: Install coverage report generator
        if: always()
        run: dotnet tool install --tool-path ./.tools dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        if: always()
        run: >
          ./.tools/reportgenerator
          -reports:"${{ env.TEST_RESULTS_DIR }}/**/coverage.cobertura.xml"
          -targetdir:"${{ env.COVERAGE_REPORT_DIR }}"
          -reporttypes:"Html;Cobertura"

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: ${{ env.TEST_RESULTS_DIR }}
          if-no-files-found: error

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: ${{ env.COVERAGE_REPORT_DIR }}
          if-no-files-found: error

  database-migrations:
    name: 2. Validate database migrations
    runs-on: ubuntu-latest
    needs: quality-gate

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tech-challenge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tech-challenge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=tech-challenge;Username=postgres;Password=postgres

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_FILE }} --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Install EF Core tools
        run: dotnet tool install --tool-path ./.tools dotnet-ef --version ${{ env.EF_TOOLS_VERSION }}

      - name: Apply migrations to temporary database
        run: >
          ./.tools/dotnet-ef database update
          --project ${{ env.INFRA_PROJECT }}
          --startup-project ${{ env.API_PROJECT }}
          --configuration ${{ env.CONFIGURATION }}
          --no-build

      - name: Generate idempotent migration script
        run: >
          ./.tools/dotnet-ef migrations script
          --idempotent
          --project ${{ env.INFRA_PROJECT }}
          --startup-project ${{ env.API_PROJECT }}
          --configuration ${{ env.CONFIGURATION }}
          --no-build
          --output ${{ env.MIGRATION_DIR }}/migrations.sql

      - name: Upload migration script
        uses: actions/upload-artifact@v7
        with:
          name: database-migration-script
          path: ${{ env.MIGRATION_DIR }}
          if-no-files-found: error

  publish-api:
    name: 3. Publish API artifact
    runs-on: ubuntu-latest
    needs:
      - quality-gate
      - database-migrations

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Publish API
        run: >
          dotnet publish ${{ env.API_PROJECT }}
          --configuration ${{ env.CONFIGURATION }}
          --no-restore
          --output ${{ env.PUBLISH_DIR }}

      - name: Upload API package
        uses: actions/upload-artifact@v7
        with:
          name: api-publish-package
          path: ${{ env.PUBLISH_DIR }}
          if-no-files-found: error

  docker-build:
    name: 4. Build Docker image
    runs-on: ubuntu-latest
    needs:
      - quality-gate
      - database-migrations

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Docker image
        run: >
          docker build
          --file docker/Dockerfile
          --tag tech-challenge-api:${{ github.sha }}
          .
