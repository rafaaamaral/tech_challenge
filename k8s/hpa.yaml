apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  # HPA apenas para a API, conforme requisito do Tech Challenge
  name: api-hpa
  namespace: tech-challenge
  labels:
    app: tech-challenge
    component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
