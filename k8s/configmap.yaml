apiVersion: v1
kind: ConfigMap
metadata:
  # Configurações não sensíveis compartilhadas pela API e pelo PostgreSQL
  name: tech-challenge-config
  namespace: tech-challenge
  labels:
    app: tech-challenge
    component: config
data:
  ASPNETCORE_ENVIRONMENT: Production
  POSTGRES_DB: tech-challenge
  SMTP_HOST: smtp.example.com
  SMTP_PORT: "587"
  API_BASE_URL: http://api.tech-challenge.svc.cluster.local:8080
