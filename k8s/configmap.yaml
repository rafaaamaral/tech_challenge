apiVersion: v1
kind: ConfigMap
metadata:
  # Configurações não sensíveis compartilhadas pela API e pelo PostgreSQL
  name: tech-challenge-config
  namespace: tech-challenge
  labels:
    app: tech-challenge
    component: config
data:
  ASPNETCORE_ENVIRONMENT: Production
  POSTGRES_DB: tech-challenge
  Email__Host: host.docker.internal
  Email__Port: "25"
  Email__From: no-reply@techchallenge.com
  Email__DisplayName: Oficina Mecânica Tech-Challenge
  Email__EnableSsl: "false"
  Email__ApiBaseUrl: http://localhost:30080
  Jwt__Issuer: TechChallengeAPI
  Jwt__Audience: TechChallengeAPI
